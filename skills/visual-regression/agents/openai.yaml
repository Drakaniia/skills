interface:
  display_name: "Visual Regression"
  short_description: "Implement pixel-perfect components from user-provided reference images using Playwright screenshot comparison"
  default_prompt: "Use $visual-regression to implement a pixel-perfect component from a user-provided reference image. Save the reference as a baseline screenshot in e2e/visual/baselines/, write a Playwright visual test, and iterate the fix → re-run → diff loop until the component matches the reference."
